name: Test macOS Install

on:
  workflow_dispatch:

jobs:
  test-install:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n setup.sh post-setup.sh

      - name: Run setup script
        run: bash ./setup.sh

      - name: Verify brew bundle baseline
        run: brew bundle check --file=Brewfile

      - name: Verify Node default version
        shell: bash
        run: |
          source "$HOME/.nvm/nvm.sh"
          nvm current
          [[ "$(nvm current)" == "v24."* ]]

      - name: Verify global npm packages
        shell: bash
        run: |
          source "$HOME/.nvm/nvm.sh"
          npm list -g prettier --depth=0
          npm list -g typescript --depth=0
